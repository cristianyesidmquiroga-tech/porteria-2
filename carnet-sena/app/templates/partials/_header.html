<header class="top-header">
    <div class="header-container">
        <div id="menu-toggle" class="menu-toggle">
            <i class="fas fa-bars"></i>
        </div>
        <div class="logo-header-group">
            <img src="https://upload.wikimedia.org/wikipedia/commons/8/83/Sena_Colombia_logo.svg" alt="SENA Logo" class="header-logo">
            <h1 class="page-title highlight-rainbow text-3d">{% block title %}Panel General{% endblock %}</h1>
        </div>
        <div style="display: flex; align-items: center; gap: 20px; margin-left: auto;">
            <button class="theme-switch theme-icon-btn" aria-label="Cambiar Tema" title="Cambiar Tema">
                <i class="fas fa-moon"></i>
            </button>
            <a href="{{ url_for('usuarios.profile') }}" class="user-pill" style="margin: 0; cursor: pointer; transition: transform 0.2s; text-decoration: none; color: inherit; display: flex; align-items: center;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                <img src="{{ url_for('static', filename='uploads/profiles/' + current_user.foto) if current_user.foto else 'https://ui-avatars.com/api/?name=' + current_user.nombre + '&background=39A900&color=fff' }}" alt="User" class="nav-user-photo" onerror="this.src='https://ui-avatars.com/api/?name={{ current_user.nombre }}&background=39A900&color=fff'">
                <span>{{ current_user.nombre }}</span>
            </a>
            <a href="{{ url_for('auth.logout') }}" class="btn-logout-header" title="Cerrar Sesión">
                <i class="fas fa-sign-out-alt"></i>
                <span>Cerrar Sesión</span>
            </a>
        </div>
    </div>
</header>
