{% extends 'base.html' %}

{% block title %}Editar Objeto Externo{% endblock %}

{% block content %}
<div class="card animate-on-scroll" data-animation="scale-in" style="max-width: 600px; margin: 2rem auto;">
    <h2 style="text-align: center; margin-bottom: 1rem;">Editar Objeto Externo</h2>
    <form action="{{ url_for('porteria.actualizar_objeto', obj_id=objeto.id) }}" method="POST" class="floating-form" autocomplete="off">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="floating-group stagger-item">
            <input type="text" name="descripcion" placeholder=" " required value="{{ objeto.descripcion }}">
            <label>Descripción</label>
            <div class="floating-border"></div>
        </div>
        <div class="floating-group stagger-item">
            <input type="text" name="serial" placeholder=" " value="{{ objeto.serial }}">
            <label>Serial / Placa (Opcional)</label>
            <div class="floating-border"></div>
        </div>
        <div class="floating-group stagger-item">
            <input type="text" name="propietario" placeholder=" " value="{{ objeto.propietario }}">
            <label>Propietario / Portador</label>
            <div class="floating-border"></div>
        </div>
        <div class="floating-group stagger-item">
            <textarea name="motivo" rows="3" placeholder=" " style="resize: vertical;">{{ objeto.motivo }}</textarea>
            <label>Motivo de Ingreso</label>
            <div class="floating-border"></div>
        </div>
        <button type="submit" class="btn-primary magnetic-btn stagger-item" style="width: 100%; height: 50px; margin-top: 1rem;">
            <i class="fas fa-save"></i> Guardar Cambios
        </button>
    </form>
</div>
{% endblock %}
