version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: carnet_sena_web
    restart: always
    expose:
      - 5000
    volumes:
      # Montamos la carpeta de uploads para no perder las imágenes o códigos QR generados
      - ./app/static/uploads:/app/app/static/uploads
    env_file:
      - ../config/.env
    environment:
      - TZ=America/Bogota
    networks:
      - coolify

networks:
  coolify:
    external: true